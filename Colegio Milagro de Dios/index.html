<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colegio Milagro de Dios</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #eef4ff, #f8fafc 50%, #eefbf4);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(760px, 100%);
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(31,41,55,0.08);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 20px; color: #4b5563; line-height: 1.6; }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: white;
      border: 1px solid rgba(59,130,246,0.14);
      border-left: 6px solid #2563eb;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.08);
    }
    .card strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Colegio Milagro de Dios</h1>
    <p>Materiales organizados por nivel para Ciencia y Tecnologia.</p>
    <a class="card" href="./5to%20Secundaria/index.html">
      <strong>5to Secundaria</strong>
      Presentaciones y recursos del grado.
    </a>
  </main>
</body>
</html>
