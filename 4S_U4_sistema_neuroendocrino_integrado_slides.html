<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4S | U4 | Sistema nervioso y endocrino</title>
<style>
  :root {
    --bg: #05070b;
    --panel: rgba(10, 14, 24, .62);
    --panel-2: rgba(255, 255, 255, .08);
    --ink: #f5f8ff;
    --muted: #d7e2ff;
    --line: rgba(255, 255, 255, .14);
    --accent: #8cc8ff;
    --accent-2: #58f0d0;
    --shadow: 0 20px 60px rgba(0, 0, 0, .35);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", Arial, sans-serif;
  }
  body { user-select: none; }
  .deck {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(circle at 20% 18%, rgba(38, 82, 157, .20), transparent 26%),
      radial-gradient(circle at 78% 82%, rgba(23, 160, 140, .18), transparent 22%),
      linear-gradient(180deg, #0a0f19 0%, #05070b 100%);
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(1.01);
    transition: opacity .28s ease, transform .28s ease;
    display: grid;
    place-items: center;
  }
  .slide.active {
    opacity: 1;
    transform: scale(1);
    z-index: 2;
  }
  .image-wrap {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 18px 18px 26px;
  }
  .image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: saturate(1.02) contrast(1.02);
  }
  .shade {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.58), rgba(0,0,0,.08) 22%, rgba(0,0,0,0) 44%, rgba(0,0,0,.12) 72%, rgba(0,0,0,.70)),
      linear-gradient(to right, rgba(0,0,0,.24), rgba(0,0,0,0) 24%, rgba(0,0,0,0) 76%, rgba(0,0,0,.24));
  }
  .topbar {
    position: absolute;
    top: 18px;
    left: 22px;
    right: 22px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    z-index: 5;
  }
  .title-box {
    max-width: min(760px, 72vw);
    padding: 12px 16px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(7, 12, 23, .74), rgba(24, 38, 68, .44));
    border: 1px solid var(--line);
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow);
  }
  .kicker {
    margin: 0 0 6px;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1 {
    margin: 0;
    font-size: clamp(21px, 2.1vw, 38px);
    line-height: 1.05;
    letter-spacing: -.02em;
    text-shadow: 0 2px 14px rgba(0, 0, 0, .45);
  }
  .counter {
    min-width: 84px;
    padding: 10px 12px;
    text-align: center;
    border-radius: 999px;
    background: rgba(7, 12, 23, .72);
    border: 1px solid var(--line);
    color: var(--muted);
    font-weight: 900;
    font-size: 14px;
    letter-spacing: .03em;
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow);
  }
  .footer {
    position: absolute;
    left: 22px;
    right: 22px;
    bottom: 18px;
    z-index: 5;
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
  }
  .part-pill, .hint-pill {
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--line);
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow);
  }
  .part-pill {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .hint-pill {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .controls {
    position: absolute;
    right: 16px;
    bottom: 50%;
    transform: translateY(50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 8;
    opacity: .18;
    transition: opacity .2s ease;
  }
  .controls:hover { opacity: .92; }
  .controls button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.24);
    background: rgba(0,0,0,.46);
    color: white;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
  }
  .controls button:hover { background: rgba(140, 200, 255, .22); }
  .hit {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 6;
  }
  .hit.left { left: 0; width: 18%; }
  .hit.right { right: 0; width: 18%; }
  .overview {
    position: absolute;
    inset: 0;
    z-index: 20;
    background: rgba(3, 6, 10, .95);
    display: none;
    padding: 24px;
    overflow: auto;
  }
  .overview.show { display: block; }
  .overview-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .overview-head h2 {
    margin: 0;
    font-size: 24px;
  }
  .close-btn {
    width: auto;
    height: auto;
    padding: 9px 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 900;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .thumb {
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255,255,255,.05);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .thumb:hover {
    transform: translateY(-2px);
    border-color: rgba(140, 200, 255, .6);
  }
  .thumb img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    background: #0e1626;
  }
  .thumb div {
    padding: 10px 12px;
    font-size: 13px;
    color: var(--ink);
    font-weight: 800;
  }
  .progress {
    position: absolute;
    left: 0;
    bottom: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    z-index: 10;
    transition: width .24s ease;
  }
  .help {
    position: absolute;
    top: 84px;
    right: 22px;
    z-index: 9;
    width: 280px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(7, 12, 23, .82);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    transition: .2s ease;
    backdrop-filter: blur(8px);
  }
  .help.show {
    opacity: 1;
    transform: translateY(0);
  }
  @media (max-width: 900px) {
    .topbar { top: 10px; left: 12px; right: 12px; }
    .footer { left: 12px; right: 12px; bottom: 10px; }
    .image-wrap { padding: 8px 8px 18px; }
    .title-box { max-width: 74vw; padding: 10px 12px; }
    .hint-pill { display: none; }
    .controls { right: 8px; }
    .kicker { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="deck" id="deck">
  <div class="hit left" onclick="prevSlide()"></div>
  <div class="hit right" onclick="nextSlide()"></div>
  <div id="slideHost"></div>
  <div class="controls" aria-label="Controles">
    <button onclick="prevSlide()" title="Anterior">&#8249;</button>
    <button onclick="nextSlide()" title="Siguiente">&#8250;</button>
    <button onclick="toggleOverview()" title="Miniaturas">&#9633;</button>
  </div>
  <div class="help" id="help">
    <b>Controles:</b><br>
    Flecha derecha o espacio: avanzar<br>
    Flecha izquierda: retroceder<br>
    O: miniaturas<br>
    F: pantalla completa<br>
    H: mostrar u ocultar esta ayuda
  </div>
  <div class="overview" id="overview">
    <div class="overview-head">
      <h2>Vista general</h2>
      <button class="close-btn" onclick="toggleOverview()">Cerrar</button>
    </div>
    <div class="grid" id="thumbGrid"></div>
  </div>
  <div class="progress" id="progress"></div>
</div>
<script>
const slides = [
  {
    title: "Ruta general de la clase integrada",
    part: "Inicio",
    hint: "Sistema nervioso -> puente neuroendocrino -> glandulas -> casos",
    image: "assets/4s_neuroendocrino/01_sistema_nervioso_general.png"
  },
  {
    title: "Sistema nervioso: mapa general",
    part: "Bloque 1",
    hint: "Ubicacion de estructuras y flujo general",
    image: "assets/4s_neuroendocrino/01_sistema_nervioso_general.png"
  },
  {
    title: "La neurona como unidad funcional",
    part: "Bloque 1",
    hint: "Partes clave de la neurona",
    image: "assets/4s_neuroendocrino/02_partes_neurona.png"
  },
  {
    title: "Impulso nervioso y velocidad de respuesta",
    part: "Bloque 1",
    hint: "Senal electrica, direccion y rapidez",
    image: "assets/4s_neuroendocrino/03_impulso_nervioso.png"
  },
  {
    title: "Tipos de neuronas",
    part: "Bloque 1",
    hint: "Sensoriales, interneuronas y motoras",
    image: "assets/4s_neuroendocrino/04_tipos_neuronas.png"
  },
  {
    title: "Arco reflejo",
    part: "Bloque 1",
    hint: "Ruta corta de supervivencia",
    image: "assets/4s_neuroendocrino/05_arco_reflejo.png"
  },
  {
    title: "SNC y SNP",
    part: "Bloque 1",
    hint: "Centro de integracion y red de conexion",
    image: "assets/4s_neuroendocrino/06_snc_vs_snp.png"
  },
  {
    title: "Sinapsis quimica",
    part: "Bloque 1",
    hint: "La neurona le habla a otra neurona",
    image: "assets/4s_neuroendocrino/07_sinapsis_quimica.png"
  },
  {
    title: "Plasticidad, poda y reorganizacion",
    part: "Bloque 1",
    hint: "Cambios del sistema nervioso a lo largo del desarrollo",
    image: "assets/4s_neuroendocrino/08_plasticidad_poda.png"
  },
  {
    title: "Sistema endocrino: panorama general",
    part: "Bloque 2",
    hint: "Regulacion lenta, sostenida y distribuida",
    image: "assets/4s_neuroendocrino/09_sistema_endocrino_general.png"
  },
  {
    title: "Glandulas y hormonas",
    part: "Bloque 2",
    hint: "Quien produce y quien responde",
    image: "assets/4s_neuroendocrino/10_glandulas_hormonas.png"
  },
  {
    title: "Hormona, receptor y organo diana",
    part: "Bloque 2",
    hint: "La senal hormonal depende del receptor correcto",
    image: "assets/4s_neuroendocrino/11_hormona_organo_diana.png"
  },
  {
    title: "Homeostasis de glucosa",
    part: "Bloque 2",
    hint: "Retroalimentacion y control corporal",
    image: "assets/4s_neuroendocrino/12_homeostasis_glucosa.png"
  },
  {
    title: "Hipotalamo e hipofisis",
    part: "Bloque 3",
    hint: "Puente principal entre sistema nervioso y endocrino",
    image: "assets/4s_neuroendocrino/13_hipotalamo_hipofisis.png"
  },
  {
    title: "Eje neuroendocrino",
    part: "Bloque 3",
    hint: "Como una senal nerviosa termina activando glandulas",
    image: "assets/4s_neuroendocrino/14_eje_neuroendocrino.png"
  },
  {
    title: "Estres: respuesta integrada",
    part: "Bloque 4",
    hint: "Ejemplo real de accion conjunta",
    image: "assets/4s_neuroendocrino/15_estres_integrado.png"
  },
  {
    title: "Enfermedades endocrinas",
    part: "Bloque 4",
    hint: "Hipotiroidismo, hipertiroidismo, diabetes y desregulacion",
    image: "assets/4s_neuroendocrino/16_enfermedades_endocrinas.png"
  },
  {
    title: "Cierre: comparar dos algoritmos biologicos",
    part: "Sintesis",
    hint: "Nervioso = rapido por eventos | endocrino = bucles de retroalimentacion",
    image: "assets/4s_neuroendocrino/14_eje_neuroendocrino.png"
  }
];

let current = 0;
const host = document.getElementById("slideHost");
const grid = document.getElementById("thumbGrid");

function makeSlide(s, i) {
  return `<section class="slide ${i === 0 ? "active" : ""}" data-index="${i}">
    <div class="image-wrap"><img src="${s.image}" alt="${s.title}"></div>
    <div class="shade"></div>
    <div class="topbar">
      <div class="title-box">
        <p class="kicker">${s.part}</p>
        <h1>${s.title}</h1>
      </div>
      <div class="counter">${i + 1} / ${slides.length}</div>
    </div>
    <div class="footer">
      <div class="part-pill">${s.part}</div>
      <div class="hint-pill">${s.hint}</div>
    </div>
  </section>`;
}

function render() {
  host.innerHTML = slides.map(makeSlide).join("");
  grid.innerHTML = slides.map((s, i) =>
    `<div class="thumb" onclick="goTo(${i}); toggleOverview(false);">
      <img src="${s.image}" alt="${s.title}">
      <div>${i + 1}. ${s.title}</div>
    </div>`
  ).join("");
  updateProgress();
}

function updateProgress() {
  document.getElementById("progress").style.width = ((current + 1) / slides.length * 100) + "%";
}

function showSlide(i) {
  const all = document.querySelectorAll(".slide");
  all[current]?.classList.remove("active");
  current = (i + slides.length) % slides.length;
  all[current]?.classList.add("active");
  updateProgress();
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
function goTo(i) { showSlide(i); }

function toggleOverview(force) {
  const ov = document.getElementById("overview");
  ov.classList.toggle("show", typeof force === "boolean" ? force : !ov.classList.contains("show"));
}

function toggleHelp() {
  document.getElementById("help").classList.toggle("show");
}

function fullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") nextSlide();
  if (e.key === "ArrowLeft") prevSlide();
  if (e.key.toLowerCase() === "o") toggleOverview();
  if (e.key.toLowerCase() === "f") fullscreen();
  if (e.key.toLowerCase() === "h") toggleHelp();
  if (e.key === "Escape") toggleOverview(false);
});

render();
setTimeout(() => {
  document.getElementById("help").classList.add("show");
  setTimeout(() => document.getElementById("help").classList.remove("show"), 4500);
}, 600);
</script>
</body>
</html>
