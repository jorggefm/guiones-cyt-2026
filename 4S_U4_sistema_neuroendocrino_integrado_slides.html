      { label: "Fuente médica: Endocrine Society - Hypopituitarism", url: "https://www.endocrine.org/patient-engagement/endocrine-library/hypopituitarism" },
      { label: "Historia real: Olivia's Pituitary Tumor Story", url: "https://www.wolfsonchildrens.com/services/brain/olivia-brain-story" }
    ]
  },
  {
    kind: "case",
    section: "Caso real 4",
    title: "Hipófisis: lectura científica del caso",
    image: "assets/4s_casos_reales/08_hipofisis_tecnica.png",
    summary: "La hipófisis actúa como puente entre sistema nervioso y endocrino. Si se lesiona o comprime, pueden fallar varios ejes hormonales a la vez.",
    detail: "Esta lámina cierra la unidad porque resume el papel del hipotálamo, la hipófisis y las glándulas diana como un sistema integrado.",
    links: [
      { label: "Fuente médica: Endocrine Society - Brain Hormones", url: "https://www.endocrine.org/patient-engagement/endocrine-library/hormones-and-endocrine-function/brain-hormones" },
      { label: "Video testimonio: Pituitary Tumor | Yanir's Story", url: "https://www.youtube.com/watch?v=gKMw8Vgv1Ao" }
    ]
  }
];

let current = 0;
const host = document.getElementById("slideHost");
const grid = document.getElementById("thumbGrid");

function renderTheory(s, i) {
  return `<section class="slide ${i===0 ? "active" : ""}" data-index="${i}">
    <div class="imageWrap"><img src="${s.image}" alt="${s.title}"></div>
    <div class="shade"></div>
    <div class="topbar">
      <div class="titleBox">
        <p class="eyebrow">${s.section}</p>
        <h1>${s.title}</h1>
      </div>
      <div class="counter">${i + 1} / ${slides.length}</div>
    </div>
    <div class="notes">
      <div class="card">
        <div class="label">Palabras clave</div>
        <div class="chips">${s.keywords.map(k => `<span class="chip">${k}</span>`).join("")}</div>
      </div>
      <div class="card">
        <div class="label">Clave de lectura</div>
        <p class="comment">${s.comment}</p>
        <p class="focus">${s.focus}</p>
      </div>
    </div>
  </section>`;
}

function renderCase(s, i) {
  return `<section class="slide ${i===0 ? "active" : ""}" data-index="${i}">
    <div class="imageWrap"><img src="${s.image}" alt="${s.title}"></div>
    <div class="shade"></div>
    <div class="topbar">
      <div class="titleBox">
        <p class="eyebrow">${s.section}</p>
        <h1>${s.title}</h1>
      </div>
      <div class="counter">${i + 1} / ${slides.length}</div>
    </div>
    <div class="notes">
      <div class="card">
        <div class="label">Bibliografía y enlaces</div>
        <div class="links">${s.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener noreferrer">${l.label}</a>`).join("")}</div>
      </div>
      <div class="card">
        <div class="label">Qué nos muestra el caso</div>
        <p class="comment">${s.summary}</p>
        <p class="focus">${s.detail}</p>
      </div>
    </div>
  </section>`;
}

function makeSlide(s, i) {
  return s.kind === "case" ? renderCase(s, i) : renderTheory(s, i);
}

function render() {
  host.innerHTML = slides.map(makeSlide).join("");
  grid.innerHTML = slides.map((s, i) => `<div class="thumb" onclick="goTo(${i}); toggleOverview(false);"><img src="${s.image}" alt="${s.title}"><div>${i + 1}. ${s.title}</div></div>`).join("");
  updateProgress();
}

function updateProgress() {
  document.getElementById("progress").style.width = ((current + 1) / slides.length * 100) + "%";
}

function showSlide(i) {
  const all = document.querySelectorAll(".slide");
  all[current]?.classList.remove("active");
  current = (i + slides.length) % slides.length;
  all[current]?.classList.add("active");
  updateProgress();
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
function goTo(i) { showSlide(i); }

function toggleOverview(force) {
  const ov = document.getElementById("overview");
  ov.classList.toggle("show", typeof force === "boolean" ? force : !ov.classList.contains("show"));
}

function toggleHelp() { document.getElementById("help").classList.toggle("show"); }

function fullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") nextSlide();
  if (e.key === "ArrowLeft") prevSlide();
  if (e.key.toLowerCase() === "o") toggleOverview();
  if (e.key.toLowerCase() === "f") fullscreen();
  if (e.key.toLowerCase() === "h") toggleHelp();
  if (e.key === "Escape") toggleOverview(false);
});

render();
setTimeout(() => {
  document.getElementById("help").classList.add("show");
  setTimeout(() => document.getElementById("help").classList.remove("show"), 5000);
}, 600);
</script>
</body>
</html>
