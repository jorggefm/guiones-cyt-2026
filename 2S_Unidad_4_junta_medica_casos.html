    image: "assets/2s_u4_junta/12_cierre.png",
    keywords: ["HTML 2", "consecuencias", "vida o muerte", "aprendizaje"],
    comment: "El viernes confrontaremos cada decisi&oacute;n con un desenlace posible: qu&eacute; mejora, qu&eacute; empeora, qui&eacute;n sobrevive y por qu&eacute;.",
    focus: "La medicina real no es magia: cada decisi&oacute;n abre riesgos, costos y consecuencias."
  }
];

let current = 0;
const host = document.getElementById("slideHost");
const grid = document.getElementById("thumbGrid");

function renderLinks(s) {
  if (!s.sources) return "";
  return `<div class="sourceRow">${s.sources.map(([label, url]) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`).join("")}</div>`;
}

function renderOptions(s) {
  if (!s.options) return "";
  return `<div class="options">${s.options.map(o => `<div class="option">${o}</div>`).join("")}</div>`;
}

function makeSlide(s, i) {
  return `<section class="slide ${i === 0 ? "active" : ""}" data-index="${i}">
    <div class="imageWrap"><img src="${s.image}" alt="${s.title}"></div>
    <div class="shade"></div>
    <div class="topbar">
      <div class="titleBox"><h1>${s.title}</h1></div>
      <div class="counter">${i + 1} / ${slides.length}</div>
    </div>
    <div class="notes">
      <div class="card">
        ${s.caseTag ? `<div class="caseTag">${s.caseTag}</div>` : ""}
        <div class="label">Palabras clave</div>
        <div class="chips">${s.keywords.map(k => `<span class="chip">${k}</span>`).join("")}</div>
        ${renderLinks(s)}
      </div>
      <div class="card">
        <div class="label">Comentario para explicar</div>
        <p class="comment">${s.comment}</p>
        <p class="focus">${s.focus}</p>
        ${renderOptions(s)}
      </div>
    </div>
  </section>`;
}

function render() {
  host.innerHTML = slides.map(makeSlide).join("");
  grid.innerHTML = slides.map((s, i) => `<div class="thumb" onclick="goTo(${i}); toggleOverview(false);"><img src="${s.image}" alt="${s.title}"><div>${i + 1}. ${s.title.replace(/<[^>]*>/g, "")}</div></div>`).join("");
  updateProgress();
}

function updateProgress() {
  document.getElementById("progress").style.width = ((current + 1) / slides.length * 100) + "%";
}

function showSlide(i) {
  const all = document.querySelectorAll(".slide");
  all[current]?.classList.remove("active");
  current = (i + slides.length) % slides.length;
  all[current]?.classList.add("active");
  updateProgress();
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
function goTo(i) { showSlide(i); }

function toggleOverview(force) {
  const ov = document.getElementById("overview");
  ov.classList.toggle("show", typeof force === "boolean" ? force : !ov.classList.contains("show"));
}

function toggleHelp() {
  document.getElementById("help").classList.toggle("show");
}

function fullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") nextSlide();
  if (e.key === "ArrowLeft") prevSlide();
  if (e.key.toLowerCase() === "o") toggleOverview();
  if (e.key.toLowerCase() === "f") fullscreen();
  if (e.key.toLowerCase() === "h") toggleHelp();
  if (e.key === "Escape") toggleOverview(false);
});

render();
setTimeout(() => {
  document.getElementById("help").classList.add("show");
  setTimeout(() => document.getElementById("help").classList.remove("show"), 5000);
}, 600);
</script>
</body>
</html>
